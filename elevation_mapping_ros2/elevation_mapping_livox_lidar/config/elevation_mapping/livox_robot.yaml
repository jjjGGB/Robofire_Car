# ============================================================================
# Livox Mid360 激光雷达高程图配置
# 适配 gz_simulation 仿真环境与 simulation_waking_robot.xacro 机器人模型
# ============================================================================

elevation_mapping:
  ros__parameters:

    # ==========================================================================
    # 坐标系配置
    # ==========================================================================

    # 地图坐标系（高程图发布的参考坐标系）
    # 通常使用 "odom" 或 "map"，取决于定位系统
    map_frame_id: "odom"

    # 机器人基座坐标系（用于计算机器人相对位姿）
    # 修改：使用 base_link 以匹配 FAST-LIO 的 TF 树 (odom → base_link)
    robot_base_frame_id: "base_link"

    # ==========================================================================
    # 里程计配置
    # ==========================================================================

    # 里程计话题（用于获取机器人位姿协方差，进行运动补偿）
    # 设置为空字符串 "" 表示禁用里程计订阅，直接从 TF 获取位姿
    #
    # 重要说明：
    # - 使用里程计可以提供位姿协方差信息，改善运动补偿效果
    # - 但如果里程计时间戳与点云不同步，会导致 "Buffer empty" 错误
    # - 建议先禁用里程计进行测试，确认系统正常后再启用
    #
    # 如需启用里程计，设置为: "/odom"
    robot_odom_topic: ""

    # 里程计消息缓存大小（仅在启用里程计时生效）
    robot_pose_cache_size: 200

    # ==========================================================================
    # 输入源配置（传感器）
    # ==========================================================================

    # 输入源列表（支持多传感器融合，如 ["front_lidar", "rear_lidar"]）
    input_sources: ["livox"]

    # Livox Mid360 激光雷达配置
    livox:
      # 输入类型：pointcloud（点云）
      type: "pointcloud"

      # 订阅话题
      # 重要：Livox 仿真插件发布两个话题：
      #   - /livox/lidar          : CustomMsg 格式（不兼容）
      #   - /livox/lidar_PointCloud2 : 标准 PointCloud2 格式（兼容）
      # 必须使用 _PointCloud2 后缀的话题！
      topic: "/livox/lidar_PointCloud2"

      # 消息队列大小（建议设为 1，使用最新数据）
      queue_size: 1

      # 每次传感器更新后发布原始地图（不含 traversability 层）
      # elevation_to_costmap_node 会自动跳过不含 traversability 的消息
      # 融合地图（含 traversability）通过 fused_map_publishing_rate 定时发布
      publish_on_update: true

      # --------------------------------------------------
      # 传感器处理器配置（噪声模型）
      # --------------------------------------------------
      sensor_processor:
        # 传感器类型：laser（激光雷达）
        # 可选类型：perfect, laser, stereo, structured_light
        type: "laser"

        # ============ 激光雷达噪声模型参数 ============
        # 参考论文：Pomerleau et al., CARPI 2012
        #
        # 噪声模型公式：
        #   σ_beam = min_radius                        (光束方向误差)
        #   σ_lateral = beam_constant + beam_angle × d (横向误差，d为距离)
        #
        # Livox Mid360 规格：
        #   - 测距精度: ±2cm (在 0.2-60m 范围内)
        #   - 角分辨率: 0.2°

        # 光束方向标准差（测距精度）
        # Livox Mid360 测距精度约 2cm
        min_radius: 0.02

        # 横向误差角度系数
        # 与角分辨率相关，值越大横向不确定性随距离增长越快
        beam_angle: 0.0003

        # 横向误差常数部分
        # 固定的横向误差，与距离无关
        beam_constant: 0.005

        # ============ 点云过滤参数 ============

        # 忽略高于此高度的点（相对于机器人基座，单位：米）
        # 用于过滤天空、高处障碍物等无关点
        ignore_points_above: 2.0

        # 忽略低于此高度的点（相对于机器人基座，单位：米）
        # 用于过滤地面以下的噪声点
        ignore_points_below: -0.5

        # 最小有效距离（忽略近距离噪声，单位：米）
        cutoff_min_depth: 0.1

        # 最大有效距离（Livox Mid360 理论最大 40m，实际使用保守值）
        cutoff_max_depth: 20.0

    # ==========================================================================
    # 地图跟踪点配置
    # ==========================================================================

    # 地图中心跟随的机器人坐标系
    # 修改：使用 base_link 以匹配 FAST-LIO 的 TF 树
    track_point_frame_id: "base_link"

    # 跟踪点相对于上述坐标系的偏移（单位：米）
    # 可以设置为机器人前方，使地图更多覆盖前进方向
    track_point_x: 0.0
    track_point_y: 0.0
    track_point_z: 0.0

    # ==========================================================================
    # 时间同步配置
    # ==========================================================================

    # 最小更新频率（Hz）
    # 如果超过 1/min_update_rate 秒没有收到数据，触发超时处理
    min_update_rate: 2.0

    # TF 查询时间容差（秒）
    # 允许的时间戳偏差，值越大越容易找到有效变换，但精度降低
    time_tolerance: 1.0

    # 点云时间戳偏移（秒）
    # 用于补偿传感器延迟，通常设为 0
    time_offset_for_point_cloud: 0.0

    # 融合地图发布频率（Hz）
    # 融合地图包含后处理管线生成的 traversability 层，
    # 是 elevation_to_costmap_node 的唯一数据源（publish_on_update 已禁用）
    # 38x38 地图 + 4 个轻量级滤波器，2Hz 不会显著增加 CPU 负载
    fused_map_publishing_rate: 2.0

    # ==========================================================================
    # 机器人运动更新配置
    # ==========================================================================

    # 协方差缩放系数
    # 机器人移动时，地图不确定性增加的比例
    # 值越大，运动对地图不确定性影响越大
    robot_motion_map_update/covariance_scale: 0.01

    # ==========================================================================
    # 可见性清理配置
    # ==========================================================================

    # 可见性清理（射线追踪移除被遮挡的点）
    # 仿真环境下禁用以降低 CPU 负载；实机部署可重新启用
    enable_visibility_cleanup: false

    # 可见性清理频率（Hz）—— 仅在 enable_visibility_cleanup: true 时生效
    visibility_cleanup_rate: 1.0

    # 扫描持续时间（秒）
    # 影响清理算法的时间窗口
    scanning_duration: 1.0
