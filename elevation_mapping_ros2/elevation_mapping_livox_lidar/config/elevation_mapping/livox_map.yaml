# ============================================================================
# 高程地图参数配置
# 针对 Livox Mid360 激光雷达优化，适用于户外/地形导航场景
# ============================================================================

elevation_mapping:
  ros__parameters:

    # ==========================================================================
    # 地图几何参数
    # ==========================================================================

    # 地图尺寸（单位：米）
    # 地图以机器人为中心，向四周扩展
    # 设置为 5x5m 以匹配 local_costmap，避免 StaticLayer resize
    length_in_x: 3.0    # X 方向长度（前后），与 local_costmap 匹配
    length_in_y: 3.0    # Y 方向长度（左右），与 local_costmap 匹配

    # 地图中心位置偏移（单位：米）
    # 相对于跟踪点的偏移，可用于使地图更多覆盖前方区域
    position_x: 0.0
    position_y: 0.0

    # 栅格分辨率（单位：米/格）
    # 即每个栅格单元的边长
    #
    # 选择建议：
    #   - 0.03: 高精度，适合近距离精细建图
    #   - 0.05: 平衡选择，适合大多数场景
    #   - 0.08: 仿真优化，降低后处理计算负载（推荐仿真使用）
    #   - 0.10: 低精度，适合大范围快速建图
    #
    # 内存估算：(length_in_x / resolution) × (length_in_y / resolution) × 每格字节数
    # 0.05 → 60×60 = 3600 cells | 0.08 → 38×38 ≈ 1444 cells (↓60%)
    resolution: 0.08

    # ==========================================================================
    # 方差/不确定性参数
    # ==========================================================================

    # 最小高度方差（单位：米²）
    # 防止过度自信，即使多次测量也保留一定不确定性
    # 值过小会导致新测量难以更新已有估计
    min_variance: 0.0001

    # 最大高度方差（单位：米²）
    # 超过此值的栅格被视为不可靠，可能被重置
    max_variance: 0.5

    # Mahalanobis 距离阈值
    # 用于多高度检测（阶梯、悬崖等场景）
    #
    # 当新测量与现有估计的 Mahalanobis 距离超过此阈值时：
    #   - 认为检测到了不同的表面（如从地面到台阶）
    #   - 根据时间戳决定保留新值或旧值
    #
    # 值越小越敏感，容易检测高度突变，但也更容易误判
    # 推荐范围：2.0 - 3.0
    mahalanobis_distance_threshold: 2.5

    # 多高度测量噪声（单位：米²）
    # 当检测到多高度时添加的额外噪声
    multi_height_noise: 0.0001

    # ==========================================================================
    # 表面法向量配置
    # ==========================================================================

    # 法向量正方向轴
    # 通常为 "z"（向上），用于计算表面倾斜度
    surface_normal_positive_axis: "z"

    # ==========================================================================
    # 子地图初始化配置
    # ==========================================================================

    # 是否在启动时初始化高程地图
    # 启用后会在机器人位置创建一个初始平面
    initialize_elevation_map: false

    # 初始化方法
    # 0: 从机器人位置初始化平面
    initialization_method: 0

    # 初始子地图尺寸（单位：米）
    length_in_x_init_submap: 1.5
    length_in_y_init_submap: 1.5

    # 初始子地图边缘（单位：米）
    margin_init_submap: 0.3

    # 初始高度偏移（单位：米）
    init_submap_height_offset: 0.0

    # 初始化目标坐标系
    # 修改：使用 base_link 以匹配 FAST-LIO 的 TF 树
    target_frame_init_submap: "base_link"
